name: CD

on: 
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v3

      - name: Deploy on server
        shell: /usr/bin/bash -e {0}
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          HOST: ${{ secrets.HOST }}
        run: |
          if [ -z "$HOST" ]; then
            echo "HOST is not set. Please check your repository or organization secrets."
            echo "Error: Process completed with exit code 1."
            exit 1
          fi
          if [ -z "$SSH_KEY" ]; then
            echo "SSH_KEY is not set. Please check your repository or organization secrets."
            exit 1
          fi
          echo "$SSH_KEY" > key && chmod 600 key
          ssh -o StrictHostKeyChecking=no -i key user@"$HOST" "
            cd /app &&
            git pull &&
            docker-compose up -d --build
          "
