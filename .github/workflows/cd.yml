name: CD

on: 
  push:
      branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v3

      - name: Deploy on server
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          HOST: ${{ secrets.HOST }}
        run: |
          echo "$SSH_KEY" > key && chmod 600 key
          ssh -o StrictHostKeyChecking=no -i key user@$HOST "
            cd /app &&
            git pull &&
            docker-compose up -d --build
          "
