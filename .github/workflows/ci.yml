name: CI

on: [push, pull_request]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
          - uses: action/checkout@v3
          - uses: action/setup-python@v4
            with:
              python-version: '3.11'

          
          - name: install dependencies
            run: |
              cd backend
              pip install -r requirements.txt

          - name: Run tests
            run: |
              cd backend
              python manage.py test
  
